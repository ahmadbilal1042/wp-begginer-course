<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 6</title>
    <style>
        .questions {
            border: 1px solid rebeccapurple;
            padding: 10px 30px;
            background-color: beige;
            display: grid;
            grid-template-columns: auto auto;
            grid-template-rows: auto auto;
            justify-items: center;
            align-items: center;
        }

        .questions dl dd {
            color: rgb(106, 72, 78);
        }

        .questions dl dt {
            font-size: 20px;
            font-weight: 700;
        }

        table {
            position: sticky;
            top: 0;
            right: 0;
        }

        table tr:nth-child(even) {
            background-color: gray;
        }

        table tr:hover {
            background-color: rgb(255, 0, 0);
        }
    </style>
</head>

<body>
    <!-- Build a glossary of 5 HTML terms using dl, dt for the term and dd for the definition -->
    <dl>
        <dt>HTML</dt>
        <dd>Hypertext Markup Language</dd>
    </dl>
    <dl>
        <dt>CSS</dt>
        <dd>Cascading Stylesheets</dd>
    </dl>
    <dl>
        <dt>JS</dt>
        <dd>Javascript</dd>
    </dl>
    <dl>
        <dt>PHP</dt>
        <dd>PHP Hypertext Preprocessor</dd>
    </dl>
    <dl>
        <dt>JSON</dt>
        <dd>Javascript Objec Notation</dd>
    </dl>
    <!-- Mark up a FAQ section — dt for each question, dd for each answer, style with CSS Grid -->
    <section class="faq">
        <h2>FAQ's</h2>
        <div class="questions">
            <dl>
                <dt>Q1</dt>
                <dd>Ans 1</dd>
            </dl>
            <dl>
                <dt>Q1</dt>
                <dd>Ans 1</dd>
            </dl>
            <dl>
                <dt>Q1</dt>
                <dd>Ans 1</dd>
            </dl>
            <dl>
                <dt>Q1</dt>
                <dd>Ans 1</dd>
            </dl>
        </div>
    </section>

    <!-- Build a pricing comparison table — write the full HTML structure before touching any CSS -->
    <!-- Add thead to your table — make it sticky using position:sticky top:0 in CSS -->
    <!-- Style tbody rows with alternating background using CSS :nth-child(even) -->
    <!-- Add a totals row in tfoot — style it with bold text and a top border different from tbody -->
     <!-- Add scope='col' to column headers and scope='row' to row headers — test with a screen reader -->
    <table>
        <thead>
            <tr>
                <th scope="col">Feature</th>
                <th scope="col">Basic</th>
                <th scope="col">Standard</th>
                <th scope="col">Premium</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <th scope="row">Price</th>
                <td>10$</td>
                <td>20$</td>
                <td>30$</td>
            </tr>
            <tr>
                <th scope="row">Storage</th>
                <td>10 GB</td>
                <td>20 GB</td>
                <td>30 GB</td>
            </tr>
            <tr>
                <th scope="row">Support</th>
                <td>Email</td>
                <td>Chat</td>
                <td>Call</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <th scope="row">Total Rows</th>
                <td>3</td>
                <td>3</td>
                <td>3</td>
            </tr>
        </tfoot>
    </table>
    <div style="height: 500vh;"></div>


    <script>
        let rows = document.querySelectorAll("tr")


        Array.from(rows).forEach(row => {
            row.addEventListener("click", () => {
                alert("Row Clicked")
            })
        });

    </script>

</body>

</html>
