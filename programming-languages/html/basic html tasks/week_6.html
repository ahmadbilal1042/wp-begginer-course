<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 6</title>
    <style>
        .questions {
            border: 1px solid rebeccapurple;
            padding: 10px 30px;
            background-color: beige;
            display: grid;
            grid-template-columns: auto auto;
            grid-template-rows: auto auto;
            justify-items: center;
            align-items: center;
        }

        .questions dl dd {
            color: rgb(106, 72, 78);
        }

        .questions dl dt {
            font-size: 20px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <!-- Build a glossary of 5 HTML terms using dl, dt for the term and dd for the definition -->
    <dl>
        <dt>HTML</dt>
        <dd>Hypertext Markup Language</dd>
    </dl>
    <dl>
        <dt>CSS</dt>
        <dd>Cascading Stylesheets</dd>
    </dl>
    <dl>
        <dt>JS</dt>
        <dd>Javascript</dd>
    </dl>
    <dl>
        <dt>PHP</dt>
        <dd>PHP Hypertext Preprocessor</dd>
    </dl>
    <dl>
        <dt>JSON</dt>
        <dd>Javascript Objec Notation</dd>
    </dl>
    <!-- Mark up a FAQ section — dt for each question, dd for each answer, style with CSS Grid -->
    <section class="faq">
        <h2>FAQ's</h2>
        <div class="questions">
            <dl>
                <dt>Q1</dt>
                <dd>Ans 1</dd>
            </dl>
            <dl>
                <dt>Q1</dt>
                <dd>Ans 1</dd>
            </dl>
            <dl>
                <dt>Q1</dt>
                <dd>Ans 1</dd>
            </dl>
            <dl>
                <dt>Q1</dt>
                <dd>Ans 1</dd>
            </dl>
        </div>
    </section>

</body>

</html>
